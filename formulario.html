<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Ficha de Inscrição</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Ficha de Inscrição</h2>

    <form action="salvar.php" method="POST">

        <h3>Dados Pessoais</h3>

        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="fmNome" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="fmEmail" required>

        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="fmTelefone">

        <label for="nascimento">Data de Nascimento:</label>
        <input type="date" id="nascimento" name="fmNascimento">

        <br><br>

        <label>Gênero:</label><br>

        <input type="radio" id="masculino" name="fmGenero" value="1" required>
        <label for="masculino">Masculino</label>

        <input type="radio" id="feminino" name="fmGenero" value="2">
        <label for="feminino">Feminino</label>

        <h3>Endereço</h3>

        <label for="rua">Rua:</label>
        <input type="text" id="rua" name="fmRua">

        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" name="fmCidade">

        <label for="estado">Estado:</label>
        <input type="text" id="estado" name="fmEstado">

        <label for="cep">CEP:</label>
        <input type="text" id="cep" name="fmCEP">

        <h3>Dados Corporais</h3>

        <label for="altura">Altura (cm):</label>
        <input type="number" id="altura" name="fmAltura">

        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" name="fmPeso">

        <br><br>

        <label>Modalidade : </label><br>

        <input type="radio" id="Modalidade" name="fmAtividade" value="1" required>
        <label for="Basquete">Basquete</label>

        <input type="radio" id="Modalidade" name="fmAtividade" value="2">
        <label for="Futebol">Futebol</label>

        <input type="radio" id="Modalidade" name="fmAtividade" value="3">
        <label for="Futsal">Futsal</label>

        <input type="radio" id="Modalidade" name="fmAtividade" value="4">
        <label for="Handel">Handebol</label>

        <input type="radio" id="Modalidade" name="fmAtividade" value="5">
        <label for="Volei">Volei</label>

        <br><br>

        <input type="submit" value="Enviar Inscrição" class="btn">

    </form>

</body>

</html>
